<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head><title>Tabela de números</title></h:head>
<h:body>
	<p:link outcome="index" value="Cadastro"/><br/><br/>
	<p:panel header="Registro de jogadas" >
		<p:messages id="messages" showDetail="true" closable="true">
			<p:autoUpdate/>
		</p:messages>
		<p:dataTable id="dataTable" rendered="true" value="#{jogoBean.lista}" var="j"
		 paginator="true" rows="6" rowSelectMode="add" paginatorPosition="bottom" emptyMessage="Nenhum registro encontrado.">
		 
			<p:column headerText="Código" sortBy="#{j.id}">
				<p:outputLabel value="#{j.id}"/>
			</p:column>
		    <p:column headerText="Número 1" sortBy="#{j.v1}">
		    	<p:outputLabel value="#{j.v1}"/>
		    </p:column>
		    <p:column headerText="Número 2" sortBy="#{j.v2}">
		    	<p:outputLabel value="#{j.v2}"/>
		    </p:column>
		    <p:column headerText="Número 3" sortBy="#{j.v3}">
		    	<p:outputLabel value="#{j.v3}"/>
		    </p:column>
		    <p:column headerText="Número 4" sortBy="#{j.v4}">
		    	<p:outputLabel value="#{j.v4}"/>
		    </p:column>
		    <p:column headerText="Número 5" sortBy="#{j.v5}">
		    	<p:outputLabel value="#{j.v5}"/>
		    </p:column>
		    <p:column headerText="Data cadastro" sortBy="#{j.dataCadastro}">
		    	<p:outputLabel value="#{j.dataCadastro}"/>
		    </p:column>
		    
		    <p:column headerText="Editar">
                <p:commandButton icon="pi pi-cog" styleClass="edit-button rounded-button" action="editarNumeros.xhtml">
                    <f:setPropertyActionListener value="#{j}" target="#{jogoBean.jogo}" />
                </p:commandButton>
            </p:column>
            
		    <p:column headerText="Deletar">
                <p:commandButton class="ui-button-warning" icon="pi pi-trash" action="#{jogoBean.deletar}" >
                    <f:setPropertyActionListener value="#{j}" target="#{jogoBean.jogo}" />
                </p:commandButton>
            </p:column>
            
            <p:column exportable="false">
                <p:commandButton icon="pi pi-cog" update=":dialogs:manage-product-content"
                    oncomplete="PF('manageProductDialog').show()"
                    styleClass="edit-button rounded-button" process="@this">
                    <f:setPropertyActionListener value="#{j}" target="#{jogoBean.jogo}" />
                    <p:resetInput target=":dialogs:manage-product-content" />
                </p:commandButton>
            </p:column>
            
		</p:dataTable>
	</p:panel>
	
        <h:form id="dialogs">
        <p:dialog header="Editar jogadores" showEffect="fade" modal="true" widgetVar="manageProductDialog"
            responsive="true">
            <p:outputPanel id="manage-product-content" class="ui-fluid">
                <p:outputPanel rendered="#{not empty jogoBean.jogo}">
                    <div class="field">
                        <h:outputText value="#{jogoBean.jogo.maiorN}"/>
                    </div>
                </p:outputPanel>
            </p:outputPanel>

        </p:dialog>

       
    </h:form>

</h:body>
</html>
